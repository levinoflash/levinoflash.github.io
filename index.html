<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levino Cheat - Get Key</title>
    <link rel="icon" type="image/png" sizes="512x512" href="favicon.png">
    <link rel="apple-touch-icon" sizes="512x512" href="favicon.png">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            color: #c8c8c8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(80, 80, 80, 0.15);
            border-radius: 8px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 32px;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .logo p {
            color: #b4b4b4;
            font-size: 13px;
            margin-top: 8px;
        }

        .key-section {
            background: rgba(40, 40, 40, 0.6);
            border: 1px solid rgba(80, 80, 80, 0.15);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .key-label {
            font-size: 13px;
            color: #b4b4b4;
            margin-bottom: 10px;
        }

        .key-display {
            background: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(80, 80, 80, 0.15);
            border-radius: 4px;
            padding: 15px;
            font-size: 16px;
            color: #ffffff;
            text-align: center;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading {
            color: #808080;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .button {
            width: 100%;
            background: rgba(40, 40, 40, 0.8);
            border: 1px solid rgba(80, 80, 80, 0.15);
            color: #b4b4b4;
            padding: 14px 20px;
            font-size: 13px;
            font-family: 'Consolas', monospace;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }

        .button:hover {
            background: rgba(50, 50, 50, 0.9);
            border-color: rgba(100, 100, 100, 0.3);
            color: #ffffff;
        }

        .button:active {
            transform: scale(0.98);
        }

        .button.primary {
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a1a;
            font-weight: 600;
        }

        .button.primary:hover {
            background: #ffffff;
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            text-align: center;
            font-size: 12px;
            color: #808080;
            margin-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>LEVINO CHEAT</h1>
            <p>Roblox Exploit - Key System</p>
        </div>

        <div class="key-section">
            <div class="key-label">YOUR ACCESS KEY</div>
            <div class="key-display" id="keyDisplay"></div>
        </div>

        <button class="button primary" id="copyBtn" disabled>Copy Key</button>
        <button class="button" id="refreshBtn">Refresh Key</button>

        <div class="info">
            <p>Use this key in the Levino Cheat key system.<br>
            Key updates automatically from GitHub.</p>
        </div>
    </div>

    <script>
        const keyDisplay = document.getElementById('keyDisplay');
        const copyBtn = document.getElementById('copyBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const KEY_URL = 'https://raw.githubusercontent.com/Levinorbx/Levino-Cheat/refs/heads/main/Key.txt';
        let currentKey = '';

        async function loadKey() {
            try {
                const response = await fetch(KEY_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Failed');
                const newKey = (await response.text()).trim();
                if (newKey) {
                    currentKey = newKey;
                    keyDisplay.textContent = currentKey;
                    copyBtn.disabled = false;
                }
            } catch (error) {
                if (!currentKey) {
                    keyDisplay.textContent = 'Error loading key';
                }
            }
        }

        async function copyKey() {
            try {
                await navigator.clipboard.writeText(currentKey);
            } catch (error) {
                const textarea = document.createElement('textarea');
                textarea.value = currentKey;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }

        copyBtn.addEventListener('click', copyKey);
        refreshBtn.addEventListener('click', loadKey);
        loadKey();
    </script>
</body>
</html>
